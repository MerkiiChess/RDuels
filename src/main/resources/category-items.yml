# Категории предметов для редактора кастомных китов.
# ID категории используются в menu.yml и click handlers.
categories:
  swords:
    id: "SWORDS"
    display-material: DIAMOND_SWORD
    display-name: "Мечи"
    items:
      - DIAMOND_SWORD
      - STONE_SWORD
      - NETHERITE_SWORD
      - IRON_SWORD
  other-items:
    id: "UTILITY"
    display-material: TOTEM_OF_UNDYING
    display-name: "Вспомогательные предметы"
    items:
      - SHIELD
      - TOTEM_OF_UNDYING
      - ENDER_PEARL
      - GOLDEN_APPLE
  helmets:
    id: "HELMET"
    display-material: DIAMOND_HELMET
    display-name: "Шлемы"
    items:
      - DIAMOND_HELMET
      - IRON_HELMET
      - NETHERITE_HELMET
