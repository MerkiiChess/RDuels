# =============================================================
# НАСТРОЙКИ ГРАФИЧЕСКИХ ИНТЕРФЕЙСОВ (GUI)
# Используется формат MiniMessage.
# Подсказка по цветам: <color>, <gradient:color1:color2>, <bold>, <italic>
# =============================================================

# =============================================================
# НАСТРОЙКИ ГРАФИЧЕСКИХ ИНТЕРФЕЙСОВ (GUI)
# =============================================================

settings:
  gui:
    # --- Меню выбора и создания наборов ---
    create-kit:
      title: '<gradient:#FFAA00:#FFFF55><bold>Выбор Вашего Кита'
      inventory:
        page-resolver: KIT_LIST
        structure:
          - "xxxxxxxxx"
          - "xyyyyyyyx"
          - "xxxxExxxx"
        mapping:
          x: background
          y: kit-selection
          E: exit
        page-items: [y]
        items:
          background:
            material: GRAY_STAINED_GLASS_PANE
            name: " "
          exit:
            material: BARRIER
            name: '<red><b>[<white>!<b>] <red>Закрыть меню'
            on-click: { callback: EXIT_MENU }
          kit-selection:
            material: 'GRAY_GLAZED_TERRACOTTA'
            name: '<yellow>● <white>%kit_display_name% <yellow>●'
            lore:
              - ""
              - " <gray>Статус: %is_selected%"
              - ""
              - " <yellow>ЛКМ: <white>Выбрать этот кит"
              - " <yellow>ПКМ: <white>Редактировать содержимое"
              - ""
            on-click:
              left: { callback: SELECT_KIT }
              right: { open: edit-kit }

    edit-kit:
      title: '<gradient:#55FFFF:#5555FF>Редактор: <white>Снаряжение'
      inventory:
        page-items: ['*', H, C, L, B, O]
        page-resolver: KIT_SLOTS
        structure:
          - "*********"
          - "*********"
          - "*********"
          - "*********"
          - "BLCHOxxxx"
          - "xxxxExxxx"
        mapping:
          x: background
          E: exit
          H: helmet
          C: chestplate
          L: leggings
          B: boots
          O: offhand
          '*': kit-slot
        items:
          background: { material: BLACK_STAINED_GLASS_PANE, name: " " }
          exit:
            material: DARK_OAK_DOOR
            name: '<red><b>[<white>!<b>] <red>Назад к выбору китов'
            on-click: { callback: EXIT_MENU }
          helmet:
            slot-id: 39
            category-id: HELMET
            material: "%slot_material%"
            default-material: LEATHER_HELMET
            name: '<aqua>Шлем <gray>| <white>Слот #39'
            on-click: &armor_click
              left: { callback: OPEN_CATEGORY }
              right: { callback: EDIT_ENCHANT_OR_AMOUNT }
              shift-left: { callback: REMOVE_ITEM }
              shift-right: { callback: REMOVE_ITEM }
          chestplate:
            slot-id: 38
            category-id: CHESTPLATE
            material: "%slot_material%"
            default-material: LEATHER_CHESTPLATE
            name: '<aqua>Нагрудник <gray>| <white>Слот #38'
            on-click: *armor_click
          leggings:
            slot-id: 37
            category-id: LEGGINGS
            material: "%slot_material%"
            default-material: LEATHER_LEGGINGS
            name: '<aqua>Поножи <gray>| <white>Слот #37'
            on-click: *armor_click
          boots:
            slot-id: 36
            category-id: BOOTS
            material: "%slot_material%"
            default-material: LEATHER_BOOTS
            name: '<aqua>Ботинки <gray>| <white>Слот #36'
            on-click: *armor_click
          offhand:
            slot-id: 40
            category-id: "ALL"
            material: "%slot_material%"
            default-material: SHIELD
            name: '<aqua>Вторая рука <gray>| <white>Слот #40'
            on-click: *armor_click
          kit-slot:
            category-id: "ALL"
            material: "%slot_material%"
            default-material: GRAY_DYE
            name: '<gradient:#FFFF55:#FFAA00>Предмет кита</gradient>'
            lore:
              - ""
              - " <yellow>ЛКМ: <white>Изменить предмет"
              - " <yellow>ПКМ: <white>Зачарования / Кол-во"
              - " <red>Shift: <gray>Очистить слот"
            on-click: *armor_click

    category-menu:
      title: '<gradient:#AAAAAA:#FFFFFF>Выберите категорию'
      inventory:
        page-items: [C]
        page-resolver: CATEGORIES
        structure:
          - "xxxxxxxxx"
          - "xCCCCCCCx"
          - "xxxxExxxx"
        mapping: { x: background, E: exit, C: category-item }
        items:
          background: { material: GRAY_STAINED_GLASS_PANE, name: " " }
          exit: { material: DARK_OAK_DOOR, name: '<red>Назад', on-click: { callback: EXIT_MENU } }
          category-item:
            material: '%category_material%'
            name: '<yellow>→ <white>%category_name%'
            on-click: { left: { callback: CHOICE_ITEM } }
    choice-item-category-menu:
      title: '<gradient:#AAAAAA:#FFFFFF>Выберите предмет'
      inventory:
        page-items:
          - I
        page-resolver: CHOICE_ITEM_CATEGORY
        structure:
          - IIIIIIIII
          - IIIIIIIII
          - IIIIIIIII
          - IIIIIIIII
          - IIIIIIIII
          - xxxxExxxx
        mapping:
          x: background
          E: exit
          I: item
        items:
          background:
            material: GRAY_STAINED_GLASS_PANE
            name: ' '
          exit:
            material: BARRIER
            name: '<red>Выход'
          item:
            material: "%category_material%"
            on-click:
              left:
                callback: SELECT_CATEGORY
              right:
                callback: SELECT_CATEGORY

    duel-choice-kit:
      title: '<gradient:#FF5555:#AA0000>⚔ Настройка поединка'
      inventory:
        structure:
          - "xxxxxxxxx"
          - "xKxAxNxTx"
          - "xxExxxFxx"
        mapping:
          x: background
          K: kit-select
          A: arena-select
          N: num-games
          T: toggle-kit-type
          E: exit
          F: fight
        items:
          background: { material: RED_STAINED_GLASS_PANE, name: " " }
          toggle-kit-type:
            material: COMMAND_BLOCK
            name: '<gradient:#55FFFF:#5555FF>🔄 Режим набора'
            lore:
              - ""
              - " <gray>Текущий режим: <white>%current_kit_type%"
              - ""
              - " <yellow>Клик: <white>Сменить Серверный / Свой"
            on-click: { callback: TOGGLE_KIT_TYPE }
          kit-select:
            material: CHEST
            name: '<gradient:#FFFF55:#FFAA00>📦 Выбрать набор'
            lore: ["", " <gray>Выберите снаряжение", " <gray>для этого боя.", ""]
            on-click: { callback: DUEL_REQUEST_KIT_OPTION }
          arena-select:
            material: MAP
            name: '<gradient:#FFFF55:#FFAA00>🗺 Выбрать арену'
            lore: ["", " <gray>Где будет проходить", " <gray>сражение?", ""]
            on-click: { callback: DUEL_REQUEST_ARENA_OPTION }
          num-games:
            material: CLOCK
            name: '<gradient:#FFFF55:#FFAA00>⏳ Количество игр'
            on-click: { callback: DUEL_REQUEST_NUM_GAMES_OPTION }
          fight:
            material: DIAMOND_SWORD
            name: '<gradient:#FF5555:#FF0000><bold>⚔ ОТПРАВИТЬ ВЫЗОВ ⚔'
            lore: ["", "<white>Нажмите, чтобы отправить", "<white>запрос оппоненту.", ""]
            on-click: { callback: REQUEST_FIGHT }
          exit:
            material: DARK_OAK_DOOR
            name: '<red>Отмена'
            on-click: { callback: EXIT_MENU }

    # --- Список партий (Party Matchmaking) ---
    party-fight:
      title: '<gradient:#FFAA00:#FF5555>Битва Кланов / Партий'
      inventory:
        page-items: [P]
        page-resolver: PARTY_LIST
        structure:
          - "xxxxxxxxx"
          - "xPPPPPPPx"
          - "xxxxExxxx"
        mapping: { x: background, E: exit, P: party-item }
        items:
          background: { material: GRAY_STAINED_GLASS_PANE, name: " " }
          exit: { material: BARRIER, name: '<red>Назад' }
          party-item:
            material: PLAYER_HEAD
            name: '<yellow>Лидер: <white>%party_owner%'
            lore:
              - ""
              - " <gray>Участники: <white>%player_list%"
              - " <gray>Статус: %fight_status%"
              - ""
              - " <gold>▶ <white>Клик: <gray>Бросить вызов всей партии"
              - ""
            on-click: { callback: CHALLENGE_PARTY }
    duel-matchmaking:
      title: '<gradient:#55FF55:#00AA00><bold>БЫСТРАЯ ИГРА: <white>Выбор режима'
      inventory:
        page-items:
          - '*'
        page-resolver: REQUEST_OPTIONS
        structure:
          - "xxxxxxxxx"
          - "x*******x"
          - "xxxxExxxx"
        mapping:
          x: background
          E: exit
          '*': matchmaking-option
        items:
          background:
            material: LIME_STAINED_GLASS_PANE
            name: " "
          exit:
            material: BARRIER
            name: '<red><b>[<white>!<b>] <red>Отмена'
            on-click:
              callback: EXIT_MENU
          matchmaking-option:
            material: '%option_material%'
            name: '<yellow>● <white>Режим: <green>%option_name%'
            lore:
              - ""
              - " <gray>Нажмите, чтобы встать в"
              - " <gray>очередь на поиск соперника."
              - ""
              - " <white>Текущий кит: <green>%option_name%"
              - ""
              - " <gradient:#55FF55:#00AA00>▶ Нажмите для поиска ◀</gradient>"
              - ""
            on-click:
              callback: MATCHMAKING_SELECT_KIT

  # =============================================================
  # ЗВУКОВОЕ СОПРОВОЖДЕНИЕ
  # =============================================================
  notification:
    sounds:
      select-kit: 'BLOCK_NOTE_BLOCK_PLING'
      edit-item: 'UI_BUTTON_CLICK'
      remove-item: 'ENTITY_ITEM_BREAK'
      set-amount: 'ENTITY_EXPERIENCE_ORB_PICKUP'
      select-option: 'BLOCK_LEVER_CLICK'
      challenge-party: 'ENTITY_VILLAGER_YES'
      exit: 'BLOCK_NOTE_BLOCK_BASS'

  format:
    decimal-format: '0'
  create-settings:
    kits:
      - display-name: "Кит #1"
        invisible: false
      - display-name: "Кит #2"
        invisible: false
      - display-name: "Кит #3"
        invisible: false
      - display-name: "Кит #4"
        permission: "custom.kit.4"
        invisible: true

# =============================================================
# СООБЩЕНИЯ В ЧАТ
# =============================================================
messages:
  serializer: MINI_MESSAGE
  # Префиксы делают чат аккуратнее
  kit-selected: '<gray>[<gradient:#FFAA00:#FFFF55>Дуэли</gradient>] <white>Вы выбрали набор: <green>%kit_name%'
  item-removed: '<gray>[<red>!</gray>] <white>Предмет удален из слота <red>%slot%'
  option-selected: '<gray>[<green>✓</gray>] <white>Параметр изменен на: <yellow>%option_name%'
  challenge-sent: '<gray>[<yellow>!</gray>] <white>Вызов для партии <gradient:#FFFF55:#FFAA00>%party_owner%</gradient> был отправлен!'
  no-permission: '<red><b>Ошибка!</b> <gray>У вас недостаточно прав для этого действия.'
  exit-menu: '<gray>Вы вышли из меню настроек.'

  # Настройка отображения плейсхолдеров
  placeholder:
    is-selected:
      enabled: '<green>● Активен'
      disabled: '<red>○ Не выбран'
    fight-status:
      free: '<green>Ожидание...'
      fighting: '<red>В сражении'