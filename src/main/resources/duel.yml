# Настройки боевой части дуэлей.

# Через сколько секунд удалять выброшенные предметы во время боя.
item-remove-seconds: 5

# Настройки меню выбора параметров боя.
choice-kit-menu:
  no-selected: "Не выбрано"
  request-num-games:
    count-fight-num:
      1:
        material: PAPER
        display-name: "1 игра"
        amount: 1
      3:
        material: PAPER
        display-name: "3 игры"
        amount: 3
      5:
        material: PAPER
        display-name: "5 игр"
        amount: 5

# Заголовки и звуки во время боя.
# fade-in/stay/fade-out задаются в тиках.
title-settings:
  to-fight:
    fade-in: 1
    fade-out: 1
    stay: 1
    text: "До начала сражения: (time)"
    sound-name: "ENTITY_PLAYER_ATTACK_CRIT"
    v1: 2.0
    v2: 2.0
  fight:
    fade-in: 1
    fade-out: 1
    stay: 1
    text: "В бой"
    sound-name: "ENTITY_PLAYER_ATTACK_CRIT"
    v1: 2.0
    v2: 2.0
  lose:
    fade-in: 1
    fade-out: 1
    stay: 1
    text: "Поражение"
    sound-name: "ENTITY_PLAYER_ATTACK_CRIT"
    v1: 2.0
    v2: 2.0
  win:
    fade-in: 1
    fade-out: 1
    stay: 1
    text: "Победа"
    sound-name: "ENTITY_PLAYER_ATTACK_CRIT"
    v1: 2.0
    v2: 2.0
